{{define "content"}}
<div class="py-8 max-w-3xl mx-auto">
    <a href="/admin" class="text-purple-600 hover:underline text-sm">&larr; Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-4 mb-6">Create New Lesson</h1>
    {{$data := .Data}}
    {{if $data}}
        {{if index $data "error"}}
        <div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm">{{index $data "error"}}</div>
        {{end}}
    {{end}}
    <form method="POST" action="/admin/lessons/new" class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" name="title" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Content (Markdown)</label>
            <textarea name="content" rows="12" class="w-full px-4 py-2 border rounded-lg font-mono text-sm focus:ring-2 focus:ring-purple-500 outline-none"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">YouTube URL (embed link)</label>
            <input type="url" name="youtube_url" placeholder="https://www.youtube.com/embed/..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-purple-600 text-white py-2.5 rounded-lg font-medium hover:bg-purple-700 transition">Create Lesson</button>
    </form>
</div>
{{end}}
