{{define "content"}}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <h1 class="text-2xl font-bold text-center text-gray-900 mb-6">Create Account</h1>
        {{$data := .Data}}
        {{if $data}}
            {{if index $data "error"}}
            <div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm">
                {{index $data "error"}}
            </div>
            {{end}}
        {{end}}
        <form method="POST" action="/signup" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-2.5 rounded-lg font-medium hover:bg-purple-700 transition">Sign Up</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Already have an account? <a href="/login" class="text-purple-600 hover:underline">Login</a>
        </p>
    </div>
</div>
{{end}}
