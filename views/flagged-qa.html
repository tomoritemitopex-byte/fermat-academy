{{define "content"}}
{{$d := .Data}}
<div class="py-8">
    <a href="/admin" class="text-purple-600 hover:underline text-sm">&larr; Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-4 mb-6">Flagged Q&A</h1>
    {{if $d}}
    <div class="space-y-4">
        {{range $d}}
        <div class="bg-white rounded-xl shadow-sm border p-6">
            <div class="flex items-start justify-between">
                <div class="flex-1">
                    <p class="text-sm text-gray-500 mb-1">Question:</p>
                    <p class="font-medium text-gray-900 mb-4">{{.Question}}</p>
                    <p class="text-sm text-gray-500 mb-1">AI Answer:</p>
                    <p class="text-gray-700">{{.Answer}}</p>
                </div>
                <form method="POST" action="/admin/flagged-qa" class="ml-4">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <button type="submit" class="bg-green-50 text-green-700 px-4 py-2 rounded-lg text-sm hover:bg-green-100">Resolve</button>
                </form>
            </div>
        </div>
        {{end}}
    </div>
    {{else}}
    <div class="text-center py-16 text-gray-500">
        <p class="text-lg">No flagged questions.</p>
    </div>
    {{end}}
</div>
{{end}}
