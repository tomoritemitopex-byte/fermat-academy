{{define "content"}}
{{$lesson := .Data}}
<div class="py-8 max-w-3xl mx-auto">
    <a href="/admin" class="text-purple-600 hover:underline text-sm">&larr; Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mt-4 mb-6">Edit Lesson</h1>
    <form method="POST" action="/admin/lessons/{{$lesson.ID}}/edit" class="bg-white rounded-xl shadow-sm border p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" name="title" value="{{$lesson.Title}}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea name="description" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">{{$lesson.Description}}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Content (Markdown)</label>
            <textarea name="content" rows="12" class="w-full px-4 py-2 border rounded-lg font-mono text-sm focus:ring-2 focus:ring-purple-500 outline-none">{{$lesson.Content}}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">YouTube URL</label>
            <input type="url" name="youtube_url" value="{{$lesson.YoutubeURL}}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-purple-600 text-white py-2.5 rounded-lg font-medium hover:bg-purple-700 transition">Save Changes</button>
    </form>
</div>
{{end}}
