<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} - {{end}}Fermat Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-purple-600">Fermat Academy</a>
                    <a href="/lessons" class="text-gray-600 hover:text-purple-600">Lessons</a>
                    <a href="/leaderboard" class="text-gray-600 hover:text-purple-600">Leaderboard</a>
                </div>
                <div class="flex items-center space-x-4">
                    {{if .User}}
                        {{if eq .User.Role "admin"}}
                            <a href="/admin" class="text-purple-600 hover:text-purple-800 font-medium">Admin</a>
                        {{end}}
                        <a href="/profile" class="text-gray-600 hover:text-purple-600">
                            {{.User.Name}}
                            {{if gt .User.XP 0}}<span class="ml-1 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">{{.User.XP}} XP</span>{{end}}
                        </a>
                        <a href="/logout" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-sm hover:bg-red-100">Logout</a>
                    {{else}}
                        <a href="/login" class="text-gray-600 hover:text-purple-600">Login</a>
                        <a href="/signup" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-purple-700">Sign Up</a>
                    {{end}}
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {{template "content" .}}
    </main>
    <footer class="bg-white border-t mt-12 py-6 text-center text-gray-500 text-sm">
        &copy; 2026 Fermat Academy. All rights reserved.
    </footer>
</body>
</html>
